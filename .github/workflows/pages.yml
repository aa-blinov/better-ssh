name: Deploy Pages

# Publishes the landing page at /docs/ to GitHub Pages. Runs on every push
# to master that touches the docs/ folder (or manually via the Actions tab).
# One-time setup required on the repo: Settings -> Pages -> Source ->
# "GitHub Actions" (not "Deploy from a branch"), otherwise this workflow
# has no Pages environment to write to.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment can run at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
